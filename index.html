<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Fleet Tracker 3D</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #cesiumContainer { width: 100%; height: 100%; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; z-index: 10; font-family: monospace; text-shadow: 2px 2px 4px #000; text-align: center; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;}
        
        #sidebar {
            position: absolute; top: 20px; right: 20px; width: 250px;
            background: rgba(15, 20, 25, 0.85); backdrop-filter: blur(8px);
            color: #fff; padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
        }
        #sidebar h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px;}
        .sat-item { margin-bottom: 10px; display: flex; align-items: center; font-size: 14px; cursor: pointer; }
        .sat-item input { margin-right: 10px; cursor: pointer; width: 16px; height: 16px;}
        .sat-item span { flex-grow: 1; }
    </style>
</head>
<body>

    <div id="loading">📡 Sunucuya Bağlanılıyor...</div>
    
    <div id="sidebar" style="display: none;">
        <h3>🛰️ My Private Fleet</h3>
        <div id="sat-list"></div>
        
        <hr style="border-color: rgba(255,255,255,0.2); margin-top: 15px; margin-bottom: 15px;">
        <div class="sat-item">
            <input type="checkbox" id="toggleAtmosphere" checked> 
            <span>Atmosfer Efekti</span>
        </div>
        <div class="sat-item">
            <input type="checkbox" id="toggleLighting"> 
            <span>Gece/Gündüz & Güneş</span>
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');

        if (!chatId) {
            document.getElementById('loading').innerHTML = "❌ Yetkisiz Giriş!<br><br>Lütfen Telegram botunuza gidip <b>/viewsat</b> komutunu yazın ve size özel üretilen linke tıklayın.";
        } else {
            startSystem();
        }

        function startSystem() {
            // YÜKSEK KALİTE VIEWER AYARLARI (Gereksiz tekrarlar silindi)
            const viewer = new Cesium.Viewer('cesiumContainer', {
                shouldAnimate: true, animation: true, timeline: true, 
                baseLayerPicker: false, geocoder: false, homeButton: false, 
                sceneModePicker: false, infoBox: true, navigationHelpButton: false
            });

            // KAPLAMA OPTİMİZASYONU: HD kaplamaları rahatlatır, FPS'i artırır.
            viewer.scene.globe.maximumScreenSpaceError = 8; 

            // Çözünürlük Ölçeği: (1.0 = Cam gibi keskin, 0.80 = Biraz bulanık ama hızlı)
            viewer.resolutionScale = 0.80; 
            
            // Kenar yumuşatmayı (Anti-Aliasing) Geri Açıyoruz! Yazılar düzelecek.
            viewer.scene.postProcessStages.fxaa.enabled = true; 
            viewer.scene.fog.enabled = false;

            // GÖLGE VE DERİNLİK İPTALİ (Performans için)
            viewer.scene.shadowMap.enabled = false;
            viewer.scene.globe.depthTestAgainstTerrain = false;

            // Başlangıç Görsel Efekt Ayarları
            viewer.clock.multiplier = 60; 
            viewer.scene.skyAtmosphere.show = true; 
            viewer.scene.globe.showGroundAtmosphere = true; 
            viewer.scene.globe.enableLighting = false; 
            viewer.scene.sun.show = false;

            // KONTROL BUTONLARININ İŞLEVLERİ
            document.getElementById('toggleAtmosphere').addEventListener('change', function(e) {
                viewer.scene.skyAtmosphere.show = e.target.checked;
                viewer.scene.globe.showGroundAtmosphere = e.target.checked;
            });

            document.getElementById('toggleLighting').addEventListener('change', function(e) {
                viewer.scene.globe.enableLighting = e.target.checked;
                viewer.scene.sun.show = e.target.checked;
            });

            const now = Cesium.JulianDate.now();
            const oneWeekLater = Cesium.JulianDate.addDays(now, 7, new Cesium.JulianDate());
            viewer.clock.startTime = now.clone();
            viewer.clock.stopTime = oneWeekLater.clone();
            viewer.clock.currentTime = now.clone();
            viewer.clock.clockRange = Cesium.ClockRange.LOOP_STOP; 
            viewer.timeline.zoomTo(now, oneWeekLater); 

            viewer.imageryLayers.removeAll(); 
            Cesium.ArcGisMapServerImageryProvider.fromUrl(
                'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer', {
                    maximumLevel: 7 // GÖRÜNTÜ OPTİMİZASYONU: HD sokak detaylarının inmesini engeller
                }
            ).then(function(provider) {
                viewer.imageryLayers.addImageryProvider(provider);
            }).catch(function(error) { console.error("Harita yüklenemedi:", error); });

            let gsEntity = null; 
            
            const loadedSatellites = new Map(); 

            function fetchLatestData() {
                fetch('/api/data?chat_id=' + chatId)
                    .then(response => {
                        if (!response.ok) throw new Error("Kayıt bulunamadı");
                        return response.json();
                    })
                    .then(data => {
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('sidebar').style.display = 'block';
                        
                        updateGroundStation(data.ground_station);
                        updateSatellites(data.satellites);
                    })
                    .catch(error => {
                        document.getElementById('loading').style.display = 'block';
                        document.getElementById('loading').innerHTML = "Henüz takip ettiğiniz bir uydu yok.<br>Botunuzdan <b>/constellation</b> veya <b>/satellite</b> komutu ile uydu ekleyin.";
                        document.getElementById('sidebar').style.display = 'none';
                    });
            }

            function updateGroundStation(gs) {
                const position = Cesium.Cartesian3.fromDegrees(gs.lon, gs.lat, gs.alt);
                if (!gsEntity) {
                    gsEntity = viewer.entities.add({
                        id: 'main_gs',
                        position: position,
                        point: { pixelSize: 12, color: Cesium.Color.RED, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
                        label: { text: gs.name, font: '14pt monospace', style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineWidth: 2, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -10) }
                    });
                    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(gs.lon, gs.lat, 15000000) });
                } else {
                    gsEntity.position = position;
                    gsEntity.label.text = gs.name;
                }
            }

            function updateSatellites(satellites) {
                const satListDiv = document.getElementById('sat-list');
                const incomingIds = new Set(satellites.map(s => s.id));

                loadedSatellites.forEach((tleHash, id) => {
                    if (!incomingIds.has(id)) {
                        viewer.entities.removeById(id);
                        const uiItem = document.getElementById('sat-ui-' + id);
                        if (uiItem) uiItem.remove();
                        loadedSatellites.delete(id);
                    }
                });

                satellites.forEach(sat => {
                    const currentTleHash = sat.line1 + sat.line2; 
                    const isNewOrUpdated = !loadedSatellites.has(sat.id) || loadedSatellites.get(sat.id) !== currentTleHash;

                    if (isNewOrUpdated) {
                        
                        if (loadedSatellites.has(sat.id)) {
                            viewer.entities.removeById(sat.id);
                        }

                        loadedSatellites.set(sat.id, currentTleHash); 

                        const satrec = satellite.twoline2satrec(sat.line1, sat.line2);
                        const radiansPerMin = satrec.no; 
                        const periodInSeconds = (2 * Math.PI * 60) / radiansPerMin; 
                        
                        const positionProperty = new Cesium.SampledPositionProperty();
                        
                        const totalSecondsInWeek = 7 * 24 * 60 * 60;
                        // YÖRÜNGE OPTİMİZASYONU: İşlemciyi %60 rahatlatır (60 yerine 180 saniye adım)
                        for (let i = -periodInSeconds; i <= totalSecondsInWeek; i += 180) {
                            const time = Cesium.JulianDate.addSeconds(now, i, new Cesium.JulianDate());
                            const jsDate = Cesium.JulianDate.toDate(time);
                            const pAndV = satellite.propagate(satrec, jsDate);
                            
                            if (pAndV.position && typeof pAndV.position.x === 'number') {
                                const gmst = satellite.gstime(jsDate);
                                const posGd = satellite.eciToGeodetic(pAndV.position, gmst);
                                const position = Cesium.Cartesian3.fromRadians(posGd.longitude, posGd.latitude, posGd.height * 1000);
                                positionProperty.addSample(time, position);
                            }
                        }

                        positionProperty.setInterpolationOptions({
                            interpolationDegree: 5,
                            interpolationAlgorithm: Cesium.LagrangePolynomialApproximation
                        });

                        const dynamicFootprintRadius = new Cesium.CallbackProperty(function(time, result) {
                            const pos = positionProperty.getValue(time);
                            if (pos) {
                                const carto = Cesium.Cartographic.fromCartesian(pos);
                                const alt = carto.height; 
                                const R = 6371000; 
                                const angle = Math.acos(R / (R + alt));
                                return R * angle; 
                            }
                            return 2500000.0; 
                        }, false);

                        viewer.entities.add({
                            id: sat.id,
                            name: sat.name,
                            position: positionProperty,
                            point: { pixelSize: 9, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.BLACK, outlineWidth: 1 },
                            label: { text: sat.name, font: '12pt sans-serif', horizontalOrigin: Cesium.HorizontalOrigin.LEFT, pixelOffset: new Cesium.Cartesian2(12, 0) },
                            
                            path: {
                                show: true,
                                leadTime: periodInSeconds / 2, 
                                trailTime: periodInSeconds, 
                                width: 2.5,
                                material: Cesium.Color.NAVY.withAlpha(0.65),
                                resolution: 1
                            },
                            
                            ellipse: {
                                semiMinorAxis: dynamicFootprintRadius, 
                                semiMajorAxis: dynamicFootprintRadius,
                                material: Cesium.Color.CYAN.withAlpha(0.15), 
                                outline: true,
                                outlineColor: Cesium.Color.CYAN
                            }
                        });

                        if (!document.getElementById('sat-ui-' + sat.id)) {
                            const div = document.createElement('div');
                            div.className = 'sat-item';
                            div.id = 'sat-ui-' + sat.id; 
                            
                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.checked = true; 
                            
                            checkbox.onchange = (e) => {
                                const entity = viewer.entities.getById(sat.id);
                                if (entity) {
                                    entity.show = e.target.checked;
                                }
                            };

                            const label = document.createElement('span');
                            label.innerText = sat.name;

                            div.appendChild(checkbox);
                            div.appendChild(label);
                            satListDiv.appendChild(div);
                        }
                    }
                });
            }

            fetchLatestData();
            setInterval(fetchLatestData, 5000);
        }
    </script>
</body>
</html>
